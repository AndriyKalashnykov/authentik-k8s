name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read   # dorny/paths-filter listFiles() on pull_request events

# The Go project (go.mod, Makefile, .mise.toml) lives in provisioner/. Jobs that
# run `make` set working-directory: provisioner at JOB level (not workflow level —
# ci-pass has no checkout, so a workflow-wide provisioner default would break it).
# mise-action reads provisioner/.mise.toml via its own working_directory input.

jobs:
  # Cheap path detector: only Go-project, workflow, or Compose changes run CI.
  # Doc / k8s changes skip the heavy jobs (positive allow-list — the code paths
  # here are enumerable). CLAUDE.md is project config, not docs, so it counts as
  # code. compose/** + .dclintrc.yaml are included because static-check runs
  # compose-lint (dclint) and the e2e job exercises the Compose stack.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            code:
              - 'provisioner/**'
              - '.github/workflows/**'
              - 'CLAUDE.md'
              - 'compose/**'
              - '.dclintrc.yaml'
            k8s:
              - 'k8s/postgresql/**'
              - 'provisioner/Makefile'
              - 'provisioner/.mise.toml'

  static-check:
    needs: [changes]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: provisioner
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          working_directory: provisioner
      - name: Static check
        run: make static-check

  build:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: provisioner
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          working_directory: provisioner
      - name: Build
        run: make build

  test:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: provisioner
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          working_directory: provisioner
      - name: Test
        run: make test

  # Build the provisioner image and scan it (Trivy HIGH/CRITICAL). No push — the
  # POC has no registry; this just proves the image builds and is CVE-clean
  # (hadolint in static-check only lints the Dockerfile, it never builds it).
  docker:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: provisioner
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          working_directory: provisioner
      - name: Build + scan image
        run: make image-scan

  # Drift gate: the committed k8s/postgresql manifest is generated from the pinned
  # Authentik Helm chart + values.yml. Fail if it's stale (e.g. a Renovate chart
  # bump without a regen). helm-only (template + diff) — no cluster needed.
  k8s-drift:
    needs: [changes]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.k8s == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: provisioner
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          working_directory: provisioner
      - name: Verify k8s manifest matches the pinned chart + values.yml
        run: make k8s-generate-check

  # Live e2e: stand up Authentik via Docker Compose, provision + verify with the
  # Go POC, tear down. No secrets needed (demo bootstrap token from .env.example).
  e2e:
    needs: [changes, build, test]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: provisioner
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          working_directory: provisioner
      - name: E2E (Authentik via Docker Compose)
        run: make e2e-compose

  # Live forward-auth e2e: stand up Authentik + Traefik + traefik/whoami via
  # Docker Compose, configure forward-auth with the POC, assert an unauthenticated
  # whoami request is intercepted (HTTP 302), tear down. Compose-class (same infra
  # as the e2e job) — gates the forward-auth runtime path the overlay adds.
  e2e-forward-auth:
    needs: [changes, build, test]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: provisioner
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true
          working_directory: provisioner
      - name: E2E forward-auth (Authentik + Traefik + whoami via Docker Compose)
        run: make e2e-forward-auth

  ci-pass:
    if: always()
    needs: [changes, static-check, build, test, docker, k8s-drift, e2e, e2e-forward-auth]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"; exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs were cancelled"; exit 1
          fi
          echo "All required jobs passed or were skipped."
