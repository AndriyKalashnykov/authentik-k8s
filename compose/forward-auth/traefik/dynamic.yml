# Traefik dynamic configuration for the Authentik forward-auth demo.
# Loaded by the file provider (see the traefik service command in
# ../docker-compose.forward-auth.yml). Hot-reloaded on change.
http:
  middlewares:
    # The Authentik forwardAuth middleware. Traefik calls this endpoint for every
    # request to a protected router; Authentik replies 2xx (allow, with identity
    # headers) or 302 (redirect to login). `trustForwardHeader` is intentionally
    # NOT set — it is deprecated since Traefik v3.6.14; the websecure entrypoint's
    # `forwardedHeaders.insecure=true` (set in the compose command) is the modern
    # replacement that lets Authentik reconstruct the original request URL.
    authentik:
      forwardAuth:
        address: http://server:9000/outpost.goauthentik.io/auth/traefik
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version

  routers:
    # The embedded outpost serves its own endpoints (the login-handshake and
    # callback) under /outpost.goauthentik.io/ on the SAME host as the protected
    # app. This router proxies those paths straight to the Authentik server. A
    # higher priority than the whoami router ensures the handshake paths win.
    authentik-outpost:
      rule: "Host(`whoami.127-0-0-1.sslip.io`) && PathPrefix(`/outpost.goauthentik.io/`)"
      entryPoints:
        - websecure
      priority: 15
      service: authentik-outpost
      tls: {}

  services:
    authentik-outpost:
      loadBalancer:
        servers:
          - url: http://server:9000
