# ============================================================================
# EXPERIMENTAL — Authentik on YugabyteDB (POC). NOT production-supported.
# ----------------------------------------------------------------------------
# This is the PostgreSQL stack with the datastore swapped for a single-node
# YugabyteDB (YSQL on 5433). It exists to test whether Authentik can run on
# YugabyteDB now that v2025.1+ ships session pg_advisory_lock() (the function
# CockroachDB still lacks). See docs/spikes/authentik-cockroachdb-yugabytedb.md.
#
# EMPIRICAL RESULT (YugabyteDB 2025.1.4.0, Authentik 2026.5, verified on KinD):
#   * Advisory locks WORK — pg_try_advisory_lock() returns true and Authentik's
#     migration lock acquires/releases cleanly (the ORIGINAL blocker is fixed).
#   * BUT Authentik's Django migrations do NOT complete: they abort with
#     YugabyteDB transaction-conflict errors (YB001 "transaction expired or
#     aborted") partway through (~around authentik_blueprints.0001_initial),
#     EVEN with yb_enable_read_committed_isolation=true. This is a deeper
#     DDL/migration-transaction incompatibility, independent of advisory locks.
#
# => Authentik does NOT install cleanly on YugabyteDB yet. PostgreSQL
#    (k8s/postgresql/) remains the supported datastore. Apply this manifest
#    only to reproduce / advance the investigation, not for real use.
# ============================================================================
