          resources:
            {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: "authentik"
                    app.kubernetes.io/instance: "authentik"
                    app.kubernetes.io/component: "worker"
                topologyKey: kubernetes.io/hostname
      enableServiceLinks: true
---
# YugabyteDB — single-node POC datastore (replaces the PostgreSQL workload).
# WHY this can work where CockroachDB cannot: YugabyteDB v2025.1+ ships
# session-scoped `pg_advisory_lock()` (GA, default-on) — the exact function
# Authentik's Django migrations + SCIM/LDAP sync require — and YSQL is rebased
# onto PostgreSQL 15, inside Authentik's supported 14-18 range. See
# docs/spikes/authentik-cockroachdb-yugabytedb.md.
#
# `yugabyted start` runs master+tserver in one process (single node). YSQL
# listens on 5433 (not 5432). `ysql_enable_auth=true` makes the built-in
# `yugabyte` superuser require the password `yugabyte`; Authentik connects as
# that user to the default `yugabyte` database (Secret: USER/NAME/PASSWORD all
# `yugabyte`, PORT 5433). Pod labels match the authentik-yugabytedb Service.
# Data is ephemeral (emptyDir) — this is a demo/e2e stack, not for real data.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: authentik-yugabytedb
  namespace: "default"
  labels:
    app.kubernetes.io/instance: authentik
    app.kubernetes.io/name: yugabytedb
    app.kubernetes.io/component: primary
spec:
  serviceName: authentik-yugabytedb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: authentik
      app.kubernetes.io/name: yugabytedb
      app.kubernetes.io/component: primary
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: authentik
        app.kubernetes.io/name: yugabytedb
        app.kubernetes.io/component: primary
    spec:
      # renovate: datasource=docker depName=yugabytedb/yugabyte
      containers:
        - name: yugabytedb
          image: yugabytedb/yugabyte:2025.1.4.0-b103@sha256:be935be963ead918d3ba6497505f0b7adb203313ccad710c111f64f697452ede
          imagePullPolicy: IfNotPresent
          command:
            - bin/yugabyted
            - start
            - --background=false
            - --base_dir=/mnt/data
            # ysql_enable_auth=true       -> `yugabyte` superuser needs a password.
            # yb_enable_read_committed_isolation=true -> REQUIRED for Authentik's
            #   Django migrations: YugabyteDB defaults YSQL to snapshot/repeatable-
            #   read and disables READ COMMITTED, under which multi-statement
            #   migration transactions abort on conflict with "transaction expired
            #   or aborted ... Consider using READ COMMITTED isolation level"
            #   (YB001). Enabling real READ COMMITTED gives per-statement retries.
            - --tserver_flags=ysql_enable_auth=true,yb_enable_read_committed_isolation=true
          env:
            # Used only by the readiness-probe ysqlsh below (the default
            # `yugabyte` superuser password under ysql_enable_auth=true).
            - name: PGPASSWORD
              value: yugabyte
          ports:
            - name: ysql
              containerPort: 5433
            - name: ycql
              containerPort: 9042
            - name: master-ui
              containerPort: 7000
            - name: tserver-ui
              containerPort: 9000
          readinessProbe:
            # yugabyted binds YSQL to the pod IP (not loopback), so probe via
            # $(hostname -i); ysqlsh lives under postgres/bin in this image.
            exec:
              command:
                - bash
                - -c
                - 'PGPASSWORD=yugabyte /home/yugabyte/postgres/bin/ysqlsh -h $(hostname -i) -p 5433 -U yugabyte -d yugabyte -tAc "SELECT 1" >/dev/null 2>&1'
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 40
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              memory: "4Gi"
          volumeMounts:
            - name: data
              mountPath: /mnt/data
      volumes:
        - name: data
          emptyDir: {}
---
# OSS Valkey — BSD-licensed, Linux-Foundation Redis fork; replaces the removed
# Bitnami image (bitnami/redis). Wire-compatible with the redis client Authentik
# uses. Pod labels match the existing authentik-redis-master Service selector.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-redis-master
  namespace: "default"
  labels:
    app.kubernetes.io/instance: authentik
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: master
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: authentik
      app.kubernetes.io/name: redis
      app.kubernetes.io/component: master
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: authentik
        app.kubernetes.io/name: redis
        app.kubernetes.io/component: master
    spec:
      containers:
        - name: redis
          image: valkey/valkey:9-alpine@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd
          imagePullPolicy: IfNotPresent
          args: ["--save", "60", "1", "--loglevel", "warning"]
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["sh", "-c", "valkey-cli ping | grep -q PONG"]
            initialDelaySeconds: 5
            periodSeconds: 5
