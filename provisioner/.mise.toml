[tools]
# Go version MUST match the `go` directive in go.mod AND the Dockerfile's
# ARG GO_VERSION (enforced by `make check-toolchain-alignment`).
go = "1.26.4"
# Lint + vuln tools (Go).
"aqua:golangci/golangci-lint" = "2.12.2"
"go:golang.org/x/vuln/cmd/govulncheck" = "1.5.0"
# Dockerfile linter.
"aqua:hadolint/hadolint" = "2.14.0"
# Local Kubernetes (KinD e2e). cloud-provider-kind runs as a pinned host
# container (see Makefile CLOUD_PROVIDER_KIND_VERSION), not a mise tool.
"aqua:kubernetes-sigs/kind" = "0.32.0"
"aqua:kubernetes/kubectl" = "1.36.2"
# Helm — used by `make k8s-generate` to regenerate k8s/postgresql from the pinned
# Authentik chart (templating only; no cluster needed).
"aqua:helm/helm" = "4.2.2"
# Security gates (static-check): filesystem CVE/secret/misconfig scan + secret scan.
"aqua:aquasecurity/trivy" = "0.71.2"
"aqua:gitleaks/gitleaks" = "8.30.1"
# Node — only for the Playwright full-login browser e2e (make e2e-forward-auth-browser);
# not needed for build/test/lint. @playwright/test is pinned in ../e2e/browser.
node = "22.23.1"
